<html>


<head>
    <title>task</title>
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>

    <form>
        <fieldset>
            <legend>Student Information</legend>
            <table>
                <tr>
                    <td>
                        <label for="fname">Full Name(Test)</label><br>
                        <input type="text" id="fname" name="fname" placeholder="Enter your full name">
                    </td>
                    <td>
                        <label for="email">Email Address</label><br>
                        <input type="email" id="email" name="email" placeholder="your email@example.com">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="password">Password</label><br>
                        <input type="pasword" id="pasword" name="pasword" placeholder="Enter secure paasword">
                    </td>
                    <td>
                        <label for="age">Age(Number)</label><br>
                        <input type="age" id="age" name="pasword" placeholder="Enter your age">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="date">Experiment Date</label><br>
                        <input type="date" id="date" name="date" placeholder="mm/dd/yyyy">

                    </td>
                    <td>
                        <label for="pnumber">Phone Number(Tel)</label><br>
                        <input type="pnumber" id="pnumber" name="pnumber" placeholder="+880 xxxx xxxxxx">


                    </td>
                </tr>
            </table>

        </fieldset>
        <button class="submit">SUBMIT</button>
        <button class="clear">CLEAR</button>
        
    </form>
</body>



</html>
