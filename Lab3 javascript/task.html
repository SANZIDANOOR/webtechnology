<html>

<head>
    <title>task</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="script.css">
</head>

<body>

    <div class="container">
    <h2>Student Registration</h2>
 
    <form id="regForm">
      <label>First Name <span class="required">*</span></label>
      <input type="text" id="firstName">
      <span class="error" id="firstNameError"></span>
 
      <label>Last Name <span class="required">*</span></label>
      <input type="text" id="lastName">
      <span class="error" id="lastNameError"></span>
 
      <label>Student ID <span class="required">*</span></label>
      <input type="text" id="studentId" placeholder="e.g. 20-12345-1">
      <span class="error" id="studentIdError"></span>
 
      <label>Email <span class="required">*</span></label>
      <input type="text" id="email" placeholder="abc@student.aiub.edu">
      <span class="error" id="emailError"></span>
 
      <label>Credit Completed <span class="required">*</span></label>
      <input type="number" id="credit">
      <span class="error" id="creditError"></span>
 
      <label>Department <span class="required">*</span></label>
      <select id="department">
        <option value="">-- Select Department --</option>
        <option value="CSE">CSE</option>
        <option value="EEE">EEE</option>
        <option value="BBA">BBA</option>
        <option value="ENGLISH">English</option>
        <option value="CIVIL">Civil Engineering</option>
      </select>
      <span class="error" id="departmentError"></span>
 
      <div class="btn-wrapper">
        <button type="button" id="submitBtn" onClick=validation()>Submit</button>
      </div>
    </form>
  </div>
 
  <div class="container">
    <h2>Registered Students</h2>
    <table id="studentTable">
      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Student ID</th>
          <th>Email</th>
          <th>Credit Completed</th>
          <th>Department</th>
        </tr>
      </thead>
      <tbody id="studentTableBody">
      </tbody>
    </table>
  </div>
 
  
</body>
 
</html>
